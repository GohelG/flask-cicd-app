{% extends "base.html" %}

{% block title %}Add New Student - Student Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Add New Student Profile</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <!-- Name Input -->
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Full Name</label>
                        <input type="text" name="name" id="name" class="form-control" placeholder="e.g. John Doe" required>
                    </div>

                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="e.g. john.doe@example.com" required>
                    </div>

                    <!-- Course Input -->
                    <div class="mb-3">
                        <label for="course" class="form-label fw-bold">Enrolled Course</label>
                        <input type="text" name="course" id="course" class="form-control" placeholder="e.g. Flask Web Development" required>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Save Student Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
