<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Registration{% endblock %}</title>
    <!-- Bootstrap CSS Framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <!-- Global Navigation & Header Layout Block -->
    {% block header %}
    <h1 class="mb-4 text-center">Student Registration System</h1>

    <div class="mb-4">
        <a href="{{ url_for('index') }}" class="btn btn-primaryme-2">Home</a>
        <a href="{{ url_for('add_student') }}" class="btn btn-success">Add Student</a>
    </div>
    {% endblock %}

    <!-- Dynamic Context Content Injection Target -->
    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <!-- Optional Bootstrap Script Bundle Component -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
