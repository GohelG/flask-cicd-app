{% extends "base.html" %}

{% block content %}
<h2>Student Directory</h2>

<table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; text-align: left;">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <!-- The loop starts BEFORE the row containing the student variables -->
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.course }}</td>
            <td>
                <!-- Ensure your edit and delete links inject the correct ID parameter -->
                <a href="{{ url_for('update_student', student_id=student._id) }}">Edit</a> | 
                <a href="{{ url_for('delete_student', student_id=student._id) }}" onclick="return confirm('Are you sure?');">Delete</a>
            </td>
        </tr>
        <!-- The loop ends AFTER the row block finishes -->
        {% endfor %}
    </tbody>
</table>
{% endblock %}
